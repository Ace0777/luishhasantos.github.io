<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luis Henrique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --blue: #3B82F6;
    --blue-dim: rgba(59,130,246,0.12);
    --blue-border: rgba(59,130,246,0.28);
    --white: #ffffff;
    --muted: rgba(255,255,255,0.42);
    --border: rgba(255,255,255,0.11);
  }

  html, body {
    min-height: 100vh;
    background: #080808;
    color: var(--white);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    font-optical-sizing: auto;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .page {
    width: 100%;
    max-width: 540px;
    padding: 3rem 1.75rem;
    text-align: center;
  }

  /* ── Status badge ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.3rem 0.75rem;
    border: 1px solid var(--blue-border);
    border-radius: 999px;
    background: var(--blue-dim);
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--blue);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--blue);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.75); }
  }

  /* ── Headline ── */
  h1 {
    font-size: clamp(2.4rem, 8vw, 3.5rem);
    font-weight: 600;
    line-height: 1.08;
    letter-spacing: -0.03em;
    color: var(--white);
    margin-bottom: 0.65rem;
  }

  h1 span { color: var(--blue); }

  /* ── Subheadline ── */
  .sub {
    font-size: clamp(0.95rem, 2.5vw, 1.05rem);
    font-weight: 400;
    line-height: 1.6;
    color: var(--muted);
    margin-bottom: 2rem;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
  }

  /* ── Pills row — Daniel's style ── */
  .pills {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.45rem;
    margin-bottom: 2.4rem;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 0.42rem;
    padding: 0.38rem 0.9rem 0.38rem 0.5rem;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--white);
    text-decoration: none;
    background: transparent;
    transition: border-color 0.18s, background 0.18s;
    white-space: nowrap;
  }

  .pill:hover {
    border-color: var(--blue-border);
    background: var(--blue-dim);
  }

  .pill-icon {
    width: 22px; height: 22px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .pill-icon.ig {
    background: radial-gradient(circle at 30% 107%,
      #fdf497 0%, #fdf497 5%,
      #fd5949 45%, #d6249f 60%,
      #285AEB 90%);
  }

  .pill-icon.li {
    background: #0a66c2;
    border-radius: 5px;
  }

  .pill-icon.mail {
    background: var(--blue-dim);
    border: 1px solid var(--blue-border);
    border-radius: 6px;
  }

  /* ── Footer ── */
  footer {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.2);
    font-weight: 400;
  }

  /* ── Mobile ── */
  @media (max-width: 480px) {
    .page { padding: 2.5rem 1.25rem; }
  }
</style>
</head>
<body>
