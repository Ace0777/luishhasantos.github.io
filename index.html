<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --blue: #3B82F6;
    --blue-dim: rgba(59,130,246,0.12);
    --blue-border: rgba(59,130,246,0.28);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.12);
    --green-border: rgba(34,197,94,0.28);
    --white: #ffffff;
    --muted: rgba(255,255,255,0.42);
    --border: rgba(255,255,255,0.11);
  }

  html, body {
    min-height: 100vh;
    background: #080808;
    color: var(--white);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    font-optical-sizing: auto;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .page {
    width: 100%;
    max-width: 540px;
    padding: 3rem 1.75rem;
    text-align: center;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.75); }
  }

  .anim {
    opacity: 0;
    animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  .delay-1 { animation-delay: 0.1s; }
  .delay-2 { animation-delay: 0.3s; }
  .delay-3 { animation-delay: 0.5s; }
  .delay-4 { animation-delay: 0.7s; }
  .delay-5 { animation-delay: 0.9s; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.3rem 0.75rem;
    border: 1px solid var(--green-border);
    border-radius: 999px;
    background: var(--green-dim);
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--green);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease-in-out infinite;
  }

  h1 {
    font-size: clamp(2.4rem, 8vw, 3.5rem);
    font-weight: 600;
    line-height: 1.08;
    letter-spacing: -0.03em;
    color: var(--white);
    margin-bottom: 0.65rem;
  }

  .code-word {
    display: inline-block;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    background-image: linear-gradient(
      100deg,
      #3B82F6 0%,
      #3B82F6 40%,
      #3B82F6 45%,
      #3B82F6 50%,
      #3B82F6 55%,
      #3B82F6 60%,
      #3B82F6 100%
    );
    background-size: 300% 100%;
    background-position: 100% 0;
    will-change: background-image;
  }

  .sub {
    font-size: clamp(0.95rem, 2.5vw, 1.05rem);
    font-weight: 400;
    line-height: 1.6;
    color: var(--muted);
    margin-bottom: 2rem;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
  }

  .pills {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.45rem;
    margin-bottom: 2.4rem;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 0.42rem;
    padding: 0.38rem 0.9rem 0.38rem 0.5rem;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--white);
    text-decoration: none;
    background: transparent;
    transition: border-color 0.18s, background 0.18s;
    white-space: nowrap;
  }

  .pill:hover {
    border-color: var(--blue-border);
    background: var(--blue-dim);
  }

  .pill-icon {
    width: 22px; height: 22px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .pill-icon.ig {
    background: radial-gradient(circle at 30% 107%,
      #fdf497 0%, #fdf497 5%,
      #fd5949 45%, #d6249f 60%,
      #285AEB 90%);
  }

  .pill-icon.li { background: #0a66c2; border-radius: 5px; }

  .pill-icon.gh {
    background: #161b22;
    border: 1px solid rgba(255,255,255,0.15);
  }

  .pill-icon.mail {
    background: var(--blue-dim);
    border: 1px solid var(--blue-border);
    border-radius: 6px;
  }

  footer {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.2);
    font-weight: 400;
  }

  @media (max-width: 480px) {
    .page { padding: 2.5rem 1.25rem; }
  }
</style>

<script>
  const el = document.getElementById('codeWord');

  const DURATION = 2800; 
  const PAUSE    = 5000; 


  const BASE  = '#3B82F6';
  const LIGHT = '#a8d4ff';
  const WHITE = '#ffffff';

  let running   = false;
  let startTime = null;
  let rafId     = null;

  function easeInOut(t) {
    return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
  }

 
  function lerp(a, b, t) {
    const ah = parseInt(a.slice(1), 16);
    const bh = parseInt(b.slice(1), 16);
    const ar = (ah >> 16) & 0xff, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
    const br = (bh >> 16) & 0xff, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
    const r  = Math.round(ar + (br - ar) * t);
    const g  = Math.round(ag + (bg - ag) * t);
    const b2 = Math.round(ab + (bb - ab) * t);
    return `rgb(${r},${g},${b2})`;
  }

  function setGradient(progress) {
    const center = progress * 1.4 - 0.2; 
    const half   = 0.12; 

    const p0 = ((center - half) * 100).toFixed(1) + '%';
    const p1 = ((center - half * 0.3) * 100).toFixed(1) + '%';
    const p2 = (center * 100).toFixed(1) + '%';
    const p3 = ((center + half * 0.3) * 100).toFixed(1) + '%';
    const p4 = ((center + half) * 100).toFixed(1) + '%';

    el.style.backgroundImage = `linear-gradient(
      100deg,
      ${BASE}   0%,
      ${BASE}   ${p0},
      ${LIGHT}  ${p1},
      ${WHITE}  ${p2},
      ${LIGHT}  ${p3},
      ${BASE}   ${p4},
      ${BASE}   100%
    )`;
  }

  function resetGradient() {
    el.style.backgroundImage = `linear-gradient(100deg, ${BASE} 0%, ${BASE} 100%)`;
  }

  function animate(ts) {
    if (!startTime) startTime = ts;
    const t = Math.min((ts - startTime) / DURATION, 1);
    setGradient(easeInOut(t));

    if (t < 1) {
      rafId = requestAnimationFrame(animate);
    } else {
      resetGradient();
      running   = false;
      startTime = null;
      setTimeout(startShine, PAUSE);
    }
  }

  function startShine() {
    if (running) return;
    running = true;
    rafId   = requestAnimationFrame(animate);
  }


  setTimeout(startShine, 1800);

  el.addEventListener('mouseenter', startShine);

  el.addEventListener('touchstart', startShine, { passive: true });
</script>
